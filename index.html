<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a1628"/>
<title>Prudence City College</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#222;min-height:100vh;font-size:14px;}
#parentLoginScreen{min-height:100vh;background:linear-gradient(135deg,#0a1628,#1a3a5c);display:flex;align-items:center;justify-content:center;padding:16px;}
#adminLoginScreen{min-height:100vh;background:linear-gradient(135deg,#1a0830,#3a0a5c);display:none;align-items:center;justify-content:center;padding:16px;}
.loginBox{background:#fff;border-radius:12px;padding:36px 30px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.loginTitle{font-size:20px;font-weight:bold;color:#0a1628;margin-bottom:4px;}
.loginSub{font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;}
.adminBadge{display:inline-block;background:#3a0a5c;color:#fff;font-size:10px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:16px;}
.loginBox label{display:block;text-align:left;font-size:13px;font-weight:bold;color:#444;margin-bottom:5px;margin-top:12px;}
.loginBox input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:7px;font-size:14px;color:#222;background:#fafafa;}
.loginBox input:focus{outline:none;border-color:#c9972c;}
.pwdWrap{position:relative;}
.pwdWrap input{padding-right:56px;}
.pwdToggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:13px;font-family:Arial,sans-serif;}
.btnLogin{width:100%;margin-top:18px;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;color:#fff;touch-action:manipulation;}
.btnLoginParent{background:#0a1628;}.btnLoginParent:hover,.btnLoginParent:active{background:#1a3a5c;}
.btnLoginAdmin{background:#3a0a5c;}.btnLoginAdmin:hover,.btnLoginAdmin:active{background:#5c1a8c;}
.loginError{color:#dc2626;font-size:13px;margin-top:8px;min-height:18px;}
.loginSwitch{margin-top:16px;padding-top:12px;border-top:1px solid #eee;font-size:12px;color:#aaa;}
.loginSwitch a{color:#c9972c;text-decoration:none;font-weight:bold;cursor:pointer;}
#appShell{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:#0a1628;display:flex;flex-direction:column;z-index:200;overflow-y:auto;transition:transform .3s;}
.sidebarTop{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center;}
.sidebarTitle{color:#e8b84b;font-size:13px;font-weight:bold;line-height:1.4;}
.sidebarSub{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.sidebarUser{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.userAvatar{width:32px;height:32px;border-radius:50%;background:#c9972c;color:#0a1628;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0;}
.userName{color:#fff;font-size:12px;font-weight:bold;}
.userEmail{color:rgba(255,255,255,.38);font-size:10px;word-break:break-all;margin-top:1px;}
.userRole{color:rgba(255,255,255,.4);font-size:10px;margin-top:1px;}
nav{flex:1;padding:6px 0;}
.navSection{padding:12px 14px 4px;color:rgba(255,255,255,.28);font-size:10px;text-transform:uppercase;letter-spacing:1px;}
.navItem{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:2px 8px;border-radius:7px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent;}
.navItem:hover,.navItem:active{background:rgba(255,255,255,.07);color:#fff;}
.navItem.active{background:rgba(201,151,44,.2);color:#e8b84b;}
.sidebarFooter{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.07);}
.btnLogout{width:100%;padding:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;font-family:Arial,sans-serif;}
.btnLogout:hover{background:rgba(255,255,255,.13);color:#fff;}
.sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;}
.sidebarOverlay.open{display:block;}
.mainContent{margin-left:220px;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.menuBtn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:#0a1628;padding:2px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.topbarTitle{font-size:16px;font-weight:bold;color:#0a1628;flex:1;}
.topbarDate{font-size:11px;color:#888;white-space:nowrap;}
.pageContent{padding:20px;flex:1;}
.page{display:none;}.page.active{display:block;}
.statsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.statCard{background:#fff;border-radius:10px;padding:16px;border:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.statIcon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.statVal{font-size:24px;font-weight:bold;color:#0a1628;line-height:1;}
.statLabel{font-size:11px;color:#888;margin-top:3px;}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden;margin-bottom:18px;}
.cardHeader{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.cardTitle{font-size:14px;font-weight:bold;color:#0a1628;}
.cardBody{padding:16px;}
.tableWrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:400px;}
th{background:#f8f9fa;color:#555;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px;padding:9px 12px;text-align:left;border-bottom:1px solid #e5e7eb;white-space:nowrap;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#fafafa;}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:bold;font-family:Arial,sans-serif;transition:opacity .15s;display:inline-block;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.btn:hover{opacity:.85;}.btn:active{opacity:.7;}.btnSm{padding:5px 10px;font-size:12px;}
.btnGold{background:#c9972c;color:#fff;}.btnNavy{background:#0a1628;color:#fff;}
.btnOutline{background:#fff;border:1px solid #ddd;color:#444;}
.btnDanger{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:bold;}
.badgeBlue{background:#dbeafe;color:#1d4ed8;}.badgePurple{background:#f3e8ff;color:#7c3aed;}
.badgeGreen{background:#dcfce7;color:#16a34a;}
.searchBar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.searchBar input,.searchBar select{padding:8px 11px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:#fff;color:#222;min-width:0;}
.searchBar input{flex:1;min-width:160px;}
.searchBar input:focus,.searchBar select:focus{outline:none;border-color:#c9972c;}
.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:999;padding:0;opacity:0;pointer-events:none;transition:opacity .2s;}
.modalOverlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;box-shadow:0 -8px 40px rgba(0,0,0,.18);}
.modalOverlay.open .modal{transform:translateY(0);}
.modalHeader{padding:16px 20px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.modalTitle{font-size:15px;font-weight:bold;color:#0a1628;}
.modalClose{background:none;border:none;font-size:20px;cursor:pointer;color:#888;padding:2px 8px;border-radius:5px;line-height:1;}
.modalClose:hover{background:#f0f0f0;}
.modalBody{padding:16px 20px;}
.modalFooter{padding:12px 20px;border-top:1px solid #f0f0f0;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}
.formRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;font-weight:bold;color:#444;margin-bottom:4px;}
.field input,.field select{width:100%;padding:9px 10px;border:1px solid #ddd;border-radius:7px;font-size:14px;font-family:Arial,sans-serif;color:#222;background:#fff;}
.field input:focus,.field select:focus{outline:none;border-color:#c9972c;}
.divider{border:none;border-top:1px solid #f0f0f0;margin:10px 0;}
.infoBox{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 12px;font-size:12px;color:#0369a1;margin-bottom:10px;}
.scoreInput{width:52px;padding:5px 4px;border:1px solid #ddd;border-radius:6px;font-size:13px;text-align:center;font-family:Arial,sans-serif;}
.scoreInput:focus{outline:none;border-color:#c9972c;}
.gradeA{color:#16a34a;font-weight:bold;}.gradeB{color:#1d4ed8;font-weight:bold;}
.gradeC{color:#d97706;font-weight:bold;}.gradeD{color:#ea580c;font-weight:bold;}
.gradeE{color:#9a3412;font-weight:bold;}.gradeF{color:#dc2626;font-weight:bold;}
.reportCard{background:#fff;border:2px solid #bbb;max-width:820px;margin:0 auto;font-family:Arial,sans-serif;position:relative;overflow:hidden;}
.reportCard::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;height:340px;background-image:var(--rc-watermark);background-size:contain;background-repeat:no-repeat;background-position:center;opacity:0.06;pointer-events:none;z-index:0;}
.reportCard>*{position:relative;z-index:1;}
.rcHead{padding:12px 16px 10px;border-bottom:3px solid #0a1628;display:flex;align-items:center;}
.rcHeadSpacer{width:84px;flex-shrink:0;}
.rcHeadCenter{flex:1;text-align:center;}
.rcSchoolName{font-size:18px;font-weight:900;color:#0a1628;text-transform:uppercase;letter-spacing:1px;}
.rcAddress{font-size:11px;color:#333;margin-top:4px;line-height:1.7;}
.rcMotto{font-size:11px;font-style:italic;color:#c9972c;font-weight:bold;margin-top:3px;}
.rcLogoRight{width:78px;height:78px;object-fit:contain;flex-shrink:0;}
.rcBanner{background:#0a1628;color:#e8b84b;text-align:center;padding:7px;font-size:11px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;}
.rcInfoGrid{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #ccc;}
.rcInfoCell{padding:6px 10px;border-right:1px solid #ccc;font-size:12px;}
.rcInfoCell:last-child{border-right:none;}
.rcInfoCell label{display:block;font-size:10px;text-transform:uppercase;color:#888;letter-spacing:.4px;}
.rcInfoCell span{display:block;font-weight:bold;color:#0a1628;margin-top:1px;}
.rcTable{width:100%;border-collapse:collapse;}
.rcTable thead tr{background:#0a1628;}
.rcTable thead th{color:#e8b84b;font-size:11px;padding:7px 8px;text-align:center;border:1px solid #1a3a5c;font-weight:bold;}
.rcTable thead th:first-child{text-align:left;}
.rcTable tbody tr:nth-child(even){background:#f9f9f9;}
.rcTable tbody td{padding:6px 8px;font-size:12px;border:1px solid #e0e0e0;text-align:center;}
.rcTable tbody td:first-child{text-align:left;font-weight:bold;}
.rcTable tfoot td{background:#0a1628;color:#e8b84b;font-size:11px;font-weight:bold;padding:7px 8px;border:1px solid #1a3a5c;text-align:center;}
.rcTable tfoot td:first-child{text-align:left;}
.rcBottom{display:grid;grid-template-columns:1fr 1fr;border-top:2px solid #0a1628;}
.rcGradeKey{padding:10px 12px;border-right:1px solid #ccc;}
.rcGradeKey h4{font-size:11px;text-transform:uppercase;color:#0a1628;margin-bottom:7px;font-weight:bold;letter-spacing:1px;}
.rcGradeRow{display:grid;grid-template-columns:65px 28px 1fr;font-size:11px;padding:2px 0;gap:4px;align-items:center;}
.rcSummary{padding:10px 12px;}
.rcSummary h4{font-size:11px;text-transform:uppercase;color:#0a1628;margin-bottom:7px;font-weight:bold;letter-spacing:1px;}
.rcSumRow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dotted #eee;}
.rcSumRow:last-child{border-bottom:none;}
.rcRemarks{display:grid;grid-template-columns:1fr 1fr;border-top:2px solid #0a1628;}
.rcRemarkBox{padding:10px 12px;border-right:1px solid #ccc;min-height:55px;}
.rcRemarkBox:last-child{border-right:none;}
.rcRemarkBox label{display:block;font-size:10px;font-weight:bold;text-transform:uppercase;color:#888;margin-bottom:5px;letter-spacing:.5px;}
.rcRemarkBox p{font-size:12px;color:#222;}
.rcDiscipline{border-top:2px solid #0a1628;}
.rcDiscipline table{width:100%;border-collapse:collapse;min-width:unset;}
.rcDiscipline th{background:#0a1628;color:#e8b84b;font-size:11px;padding:6px 8px;text-align:center;border:1px solid #1a3a5c;}
.rcDiscipline td{padding:8px 8px;text-align:center;font-size:13px;font-weight:bold;border:1px solid #ddd;}
.reportTabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.reportTab{padding:7px 14px;border-radius:7px;border:2px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:13px;font-weight:bold;transition:all .15s;font-family:Arial,sans-serif;touch-action:manipulation;}
.reportTab.active{background:#0a1628;color:#e8b84b;border-color:#0a1628;}
.reportTab:hover:not(.active){border-color:#c9972c;color:#c9972c;}
.menuBtn{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:#0a1628;padding:2px;-webkit-tap-highlight-color:transparent;}
.twoCol{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* ── RESPONSIVE ─────────────────────────────────────────────────── */
@media(max-width:900px){
  .statsGrid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .mainContent{margin-left:0;}
  .menuBtn{display:block;}
  .twoCol{grid-template-columns:1fr;}
  .statsGrid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .statCard{padding:12px;}
  .statVal{font-size:20px;}
  .statIcon{width:36px;height:36px;font-size:17px;}
  .pageContent{padding:12px;}
  .formRow{grid-template-columns:1fr;}
  .rcInfoGrid{grid-template-columns:1fr 1fr;}
  .rcBottom,.rcRemarks{grid-template-columns:1fr;}
  .rcGradeKey{border-right:none;border-bottom:1px solid #ccc;}
  .rcRemarkBox:first-child{border-right:none;border-bottom:1px solid #ccc;}
  .rcHead{padding:10px 12px;}
  .rcHeadSpacer{width:60px;}
  .rcLogoRight{width:60px;height:60px;}
  .rcSchoolName{font-size:14px;}
  .topbarDate{display:none;}
  table{min-width:500px;}
  .modalOverlay{align-items:flex-end;}
  .modal{border-radius:14px 14px 0 0;max-height:92vh;}
}
@media(max-width:480px){
  .statsGrid{grid-template-columns:1fr 1fr;}
  .loginBox{padding:28px 20px;}
  .loginTitle{font-size:18px;}
  .reportTabs{gap:4px;}
  .reportTab{padding:6px 10px;font-size:12px;}
  .cardHeader{padding:10px 12px;}
  .cardTitle{font-size:13px;}
  .searchBar{gap:8px;}
  .searchBar input{min-width:120px;}
  .rcInfoGrid{grid-template-columns:1fr 1fr;}
  .rcTable thead th,.rcTable tbody td,.rcTable tfoot td{padding:4px 5px;font-size:10px;}
  .rcSchoolName{font-size:12px;}
  .rcAddress,.rcMotto{font-size:9px;}
}
#loadingOverlay{position:fixed;inset:0;background:#0a1628;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
#loadingOverlay.hidden{display:none;}
.loadingSpinner{width:48px;height:48px;border:5px solid rgba(255,255,255,.15);border-top-color:#e8b84b;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:18px;}
.loadingText{color:#e8b84b;font-size:15px;font-weight:bold;letter-spacing:1px;}
.loadingSubText{color:rgba(255,255,255,.4);font-size:12px;margin-top:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- PARENT LOGIN -->

<div id="loadingOverlay">
  <div class="loadingSpinner"></div>
  <div class="loadingText">Prudence City College</div>
  <div class="loadingSubText">Connecting to database...</div>
</div>

<div id="parentLoginScreen" style="display:none;">
  <div class="loginBox">
    <img id="img1" src="" alt="PCC Logo" style="width:70px;height:70px;object-fit:contain;margin-bottom:10px;border-radius:50%;"/>
    <div class="loginTitle">Prudence City College</div>
    <div class="loginSub">Parent &amp; Guardian Portal</div>
    <label>Email Address</label>
    <input type="email" id="pEmail" placeholder="parent@email.com" autocomplete="email"/>
    <label>Password</label>
    <div class="pwdWrap"><input type="password" id="pPass" placeholder="Your password" autocomplete="current-password"/><button class="pwdToggle" onclick="togglePwd('pPass',this)">Show</button></div>
    <div class="loginError" id="parentLoginError"></div>
    <button class="btnLogin btnLoginParent" onclick="doParentLogin()">Sign In</button>
    <div class="loginSwitch">Staff login? <a onclick="showAdminLogin()">Staff Portal &rarr;</a></div>
  </div>
</div>

<!-- ADMIN / STAFF LOGIN -->
<div id="adminLoginScreen">
  <div class="loginBox">
    <img id="img2" src="" alt="PCC Logo" style="width:70px;height:70px;object-fit:contain;margin-bottom:10px;border-radius:50%;"/>
    <span class="adminBadge">Staff Portal</span>
    <div class="loginTitle">Staff Sign In</div>
    <div class="loginSub">Admin &amp; Teacher Access</div>
    <label>Email Address</label>
    <input type="email" id="aEmail" placeholder="staff@school.com" autocomplete="email"/>
    <label>Password</label>
    <div class="pwdWrap"><input type="password" id="aPass" placeholder="Your password" autocomplete="current-password"/><button class="pwdToggle" onclick="togglePwd('aPass',this)">Show</button></div>
    <div class="loginError" id="adminLoginError"></div>
    <button class="btnLogin btnLoginAdmin" onclick="doAdminLogin()">Sign In</button>
    <div class="loginSwitch">Parent? <a onclick="showParentLogin()">&larr; Parent Portal</a></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <div class="sidebarOverlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebarTop">
      <img id="img3" src="" alt="Logo" style="width:48px;height:48px;object-fit:contain;border-radius:50%;margin-bottom:6px;"/>
      <div class="sidebarTitle">Prudence City College</div>
      <div class="sidebarSub">School Management</div>
    </div>
    <div class="sidebarUser">
      <div class="userAvatar" id="uAvatar">A</div>
      <div><div class="userName" id="uName">User</div><div class="userEmail" id="uEmail"></div><div class="userRole" id="uRole"></div></div>
    </div>
    <nav id="sidebarNav"></nav>
    <div class="sidebarFooter"><button class="btnLogout" onclick="doLogout()">&#128682; Sign Out</button></div>
  </div>

  <div class="mainContent">
    <div class="topbar">
      <button class="menuBtn" onclick="toggleSidebar()">&#9776;</button>
      <div class="topbarTitle" id="topbarTitle">Dashboard</div>
      <div class="topbarDate" id="topbarDate"></div>
    </div>
    <div class="pageContent">
      <div class="page active" id="pageDashboard"></div>
      <div class="page" id="pageStudents"></div>
      <div class="page" id="pageScores"></div>
      <div class="page" id="pageReports"></div>
      <div class="page" id="pageParents"></div>
      <div class="page" id="pageSubjects"></div>
      <div class="page" id="pageStaffMgr"></div>
      <div class="page" id="pageStaffScores"></div>
      <div class="page" id="pageParentView"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modalOverlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modalHeader">
      <div class="modalTitle" id="modalTitle"></div>
      <button class="modalClose" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modalBody" id="modalBody"></div>
    <div class="modalFooter" id="modalFooter"></div>
  </div>

// Save entire DB to Firebase (debounced)
var saveTimer = null;
function saveDB() {
  if(!DB) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    dbRef.set(DB).catch(function(e){ console.error("Firebase save error:", e); });
  }, 600);
}

// Initial load from Firebase
function initFirebase() {
  dbRef.once("value").then(function(snapshot) {
    var data = snapshot.val();
    if(data) {
      DB = data;
      // Ensure new fields exist
      if(!DB.staff) DB.staff = [];
      if(!DB.nextStaffId) DB.nextStaffId = 1;
      if(!DB.scores) DB.scores = {};
    } else {
      DB = defaultDB();
      dbRef.set(DB);
    }
    hideLoading();
    document.getElementById("parentLoginScreen").style.display = "flex";
  }).catch(function(e) {
    console.error("Firebase load error:", e);
    // Fallback to localStorage
    try { var s = localStorage.getItem("pcc_v8"); if(s) DB = JSON.parse(s); } catch(x){}
    if(!DB) DB = defaultDB();
    hideLoading();
    document.getElementById("parentLoginScreen").style.display = "flex";
  });
}

function doAdminLogin(){
  var email=document.getElementById("aEmail").value.trim().toLowerCase();
  var pass=document.getElementById("aPass").value;
  var errEl=document.getElementById("adminLoginError");
  for(var i=0;i<ADMIN_ACCOUNTS.length;i++){if(ADMIN_ACCOUNTS[i].email.toLowerCase()===email&&ADMIN_ACCOUNTS[i].pass===pass){currentUser={email:ADMIN_ACCOUNTS[i].email,name:ADMIN_ACCOUNTS[i].name,role:"admin"};errEl.textContent="";document.getElementById("adminLoginScreen").style.display="none";launchApp();return;}}
  var staff=DB.staff||[];
  for(var j=0;j<staff.length;j++){if(staff[j].email.toLowerCase()===email&&staff[j].pass===pass){currentUser={email:staff[j].email,name:staff[j].name,role:"staff",staffId:staff[j].id};errEl.textContent="";document.getElementById("adminLoginScreen").style.display="none";launchApp();return;}}
  errEl.textContent="Invalid email or password.";
}

function doParentLogin(){
  var email=document.getElementById("pEmail").value.trim().toLowerCase();

function updateScore(sid,term,sub,type,el){
  var max=(type==="t1"||type==="t2")?20:60;
  var val=Math.max(0,Math.min(max,parseInt(el.value)||0));el.value=val;
  var key=String(sid);
  if(!DB.scores[key])DB.scores[key]={};
  if(!DB.scores[key][term])DB.scores[key][term]={};
  if(!DB.scores[key][term][sub])DB.scores[key][term][sub]={t1:0,t2:0,e:0};
  DB.scores[key][term][sub][type]=val;saveDB();
  var row=el.closest("tr");
  var t1V=parseInt(row.cells[1].querySelector("input").value)||0;
  var t2V=parseInt(row.cells[2].querySelector("input").value)||0;
  var eV=parseInt(row.cells[4].querySelector("input").value)||0;
  var ca=t1V+t2V,tot=ca+eV,g=getGrade(tot);
  row.cells[3].innerHTML="<strong>"+ca+"</strong>";row.cells[5].innerHTML="<strong>"+tot+"</strong>";
  row.cells[6].textContent=g.grade;row.cells[6].className="grade"+g.grade;row.cells[7].textContent=g.remark;
}

      }

function buildReportData(sid,term){
  var stu=null;for(var i=0;i<DB.students.length;i++){if(DB.students[i].id==sid){stu=DB.students[i];break;}}
  if(!stu)return null;
  var subs=getSubjects(stu.cls,stu.dept),key=String(sid);
  var td=(DB.scores[key]&&DB.scores[key][term])?DB.scores[key][term]:{};
  var rows=[],total=0;
  for(var j=0;j<subs.length;j++){var sub=subs[j],sc=td[sub]||{t1:0,t2:0,e:0};var ca=calcCA(sc),tot=calcTotal(sc),g=getGrade(tot);total+=tot;rows.push({sub:sub,t1:sc.t1||0,t2:sc.t2||0,ca:ca,e:sc.e||0,tot:tot,grade:g.grade,remark:g.remark});}
  var avg=subs.length?(total/subs.length).toFixed(2):"0.00";
  var clsAvg=(DB.classAvg&&DB.classAvg[key]&&DB.classAvg[key][term])?DB.classAvg[key][term]:"-";
  var numCls=(DB.numInClass&&DB.numInClass[key]&&DB.numInClass[key][term])?DB.numInClass[key][term]:"-";
  return{stu:stu,term:term,rows:rows,avg:avg,overallGrade:getGrade(parseFloat(avg)).grade,classAvg:clsAvg,numInClass:numCls};
}

      doc.setTextColor(40,40,40);doc.text(String(vals[vi]),cx+colW[vi+1]/2,ty+4.3,{align:"center"});cx+=colW[vi+1];
    }
    doc.setTextColor(gcol[0],gcol[1],gcol[2]);doc.setFont("helvetica","bold");doc.text(g2.grade,cx+colW[colW.length-2]/2,ty+4.3,{align:"center"});cx+=colW[colW.length-2];
    doc.setTextColor(60,60,60);doc.setFont("helvetica","normal");doc.setFontSize(7);doc.text(g2.remark,cx+2,ty+4.3);ty+=rowH;
  }

  // SUMMARY ROW
  var stuAvg2=data.rows.length?(totalAll2/data.rows.length).toFixed(2):"0.00";
  doc.setFillColor(220,230,245);doc.rect(M,ty,CW,7,"F");doc.setDrawColor(10,22,40);doc.setLineWidth(0.5);doc.rect(M,ty,CW,7);
  doc.setTextColor(10,22,40);doc.setFont("helvetica","bold");doc.setFontSize(7.5);
  doc.text("STUDENT AVG: "+stuAvg2,M+2,ty+4.8);doc.text("CLASS AVG: "+data.classAvg,M+CW/2-10,ty+4.8);doc.text("IN CLASS: "+data.numInClass,M+CW*0.78,ty+4.8);ty+=9;

  // GRADING + PERFORMANCE
  var hw=CW/2-2,blockH=46;
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.rect(M,ty,hw,blockH);doc.rect(M+hw+4,ty,hw,blockH);
  doc.setFillColor(10,22,40);doc.rect(M,ty,hw,6,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(7.5);
  doc.text("RANGE OF SCORE",M+3,ty+4.2);doc.text("VALUE",M+38,ty+4.2);doc.text("REMARK",M+52,ty+4.2);
  var gy=ty+8;
  for(var qi=0;qi<GRADE_KEY.length;qi++){var gk2=GRADE_KEY[qi],gkc=gc[gk2.grade]||[80,80,80];if(qi%2===0){doc.setFillColor(248,248,248);doc.rect(M,gy-3,hw,5.5,"F");}doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(40,40,40);doc.text(gk2.range+"%",M+3,gy);doc.setTextColor(gkc[0],gkc[1],gkc[2]);doc.setFont("helvetica","bold");doc.text(gk2.grade,M+40,gy);doc.setTextColor(40,40,40);doc.setFont("helvetica","normal");doc.text(gk2.remark,M+52,gy);gy+=5.5;}
  var nA2=0,nB2=0,nC2=0,nF2=0;for(var xi=0;xi<data.rows.length;xi++){if(data.rows[xi].grade==="A")nA2++;if(data.rows[xi].grade==="B")nB2++;if(data.rows[xi].grade==="C")nC2++;if(data.rows[xi].grade==="F")nF2++;}
  var px=M+hw+4;doc.setFillColor(10,22,40);doc.rect(px,ty,hw,6,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.text("PERFORMANCE SUMMARY",px+3,ty+4.2);
  var sumItems=[["Student Average",stuAvg2],["Class Average",String(data.classAvg)],["No. in Class",String(data.numInClass)],["Grade A",String(nA2)],["Grade B",String(nB2)],["Grade C",String(nC2)],["Failures",String(nF2)],["Total Subjects",String(data.rows.length)]];
  var sy2=ty+10;for(var si3=0;si3<sumItems.length;si3++){if(si3%2===0){doc.setFillColor(248,248,248);doc.rect(px,sy2-3.5,hw,5.5,"F");}doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(40,40,40);doc.text(sumItems[si3][0],px+3,sy2);doc.setFont("helvetica","bold");doc.setTextColor(10,22,40);doc.text(sumItems[si3][1],px+hw-3,sy2,{align:"right"});sy2+=5.5;}
  ty+=blockH+4;

  // DISCIPLINE
  doc.setFillColor(10,22,40);doc.rect(M,ty,CW,7,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text("TERMLY DISCIPLINE",W/2,ty+4.8,{align:"center"});ty+=7;
  var dW=CW/4,dcols=["STARTING BALANCE","POINTS DEDUCTED","POINTS ADDED","POINT BALANCE"],dvals=["150/150","0","0","150/150"];
  for(var di=0;di<4;di++){doc.setFillColor(di%2===0?240:250,di%2===0?240:250,di%2===0?245:255);doc.rect(M+di*dW,ty,dW,12,"F");doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.rect(M+di*dW,ty,dW,12);doc.setTextColor(80,80,80);doc.setFont("helvetica","bold");doc.setFontSize(6.5);doc.text(dcols[di],M+di*dW+dW/2,ty+4,{align:"center"});doc.setTextColor(10,22,40);doc.setFont("helvetica","bold");doc.setFontSize(11);doc.text(dvals[di],M+di*dW+dW/2,ty+10,{align:"center"});}
  ty+=14;

  // REMARKS
  var remH=22;doc.setDrawColor(10,22,40);doc.setLineWidth(0.5);doc.rect(M,ty,CW/2-2,remH);doc.rect(M+CW/2+2,ty,CW/2-2,remH);
  doc.setFillColor(235,240,250);doc.rect(M,ty,CW/2-2,7,"F");doc.rect(M+CW/2+2,ty,CW/2-2,7,"F");
  doc.setTextColor(10,22,40);doc.setFont("helvetica","bold");doc.setFontSize(8);doc.text("CLASS TEACHER'S REMARKS",M+3,ty+4.8);doc.text("PRINCIPAL'S REMARKS",M+CW/2+5,ty+4.8);
  doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(26,26,46);doc.text(data.stu.teacherRemark||"",M+3,ty+13,{maxWidth:CW/2-8});doc.text(data.stu.principalRemark||"",M+CW/2+5,ty+13,{maxWidth:CW/2-8});

  // FOOTER
  doc.setTextColor(150,150,160);doc.setFontSize(7);doc.setFont("helvetica","normal");doc.text("Prudence City College Management System",M,289);doc.text(new Date().toLocaleDateString("en-GB"),W-M,289,{align:"right"});

  // WATERMARK — drawn LAST so it appears over content
  try{doc.saveGraphicsState();doc.setGState(new doc.GState({opacity:0.07}));var wmSize=110;doc.addImage(LOGO_SRC,"JPEG",W/2-wmSize/2,297/2-wmSize/2,wmSize,wmSize);doc.restoreGraphicsState();}catch(e){}

  doc.save(data.stu.name.replace(/ /g,"_")+"_"+term.replace(/ /g,"_")+"_"+(isTest?"CA":"Exam")+".pdf");
}

function renderSubjects(){
  var groups=[{key:"JSS",label:"JSS 1\u20133 (Common Subjects)",info:"Applies to JS1, JS2, JS3 \u2014 no department"},{key:"Science",label:"SS 1\u20133 Science Department",info:"Applies to SS1, SS2, SS3 \u2014 Science"},{key:"Arts",label:"SS 1\u20133 Arts Department",info:"Applies to SS1, SS2, SS3 \u2014 Arts"},{key:"Commercial",label:"SS 1\u20133 Commercial Department",info:"Applies to SS1, SS2, SS3 \u2014 Commercial"}];
  var html='<div class="infoBox" style="margin-bottom:16px;">&#128218; Subject changes apply immediately to score entry and report cards.</div>';
  for(var gi=0;gi<groups.length;gi++){
    var g=groups[gi],subs=DB.subjects[g.key]||[],rows="";
    for(var si=0;si<subs.length;si++){rows+='<tr><td><strong>'+subs[si]+'</strong></td><td style="text-align:right;"><button class="btn btnOutline btnSm" onclick="openEditSubject(\''+g.key+'\','+si+')">Rename</button> <button class="btn btnDanger btnSm" onclick="deleteSubject(\''+g.key+'\','+si+')">Remove</button></td></tr>';}
    if(!rows)rows='<tr><td colspan="2" style="color:#aaa;text-align:center;padding:16px;">No subjects yet.</td></tr>';
    html+='<div class="card" style="margin-bottom:20px;"><div class="cardHeader"><div><div class="cardTitle">'+g.label+'</div><div style="font-size:11px;color:#888;margin-top:2px;">'+g.info+'</div></div><button class="btn btnGold" onclick="openAddSubject(\''+g.key+'\')">+ Add Subject</button></div><div class="tableWrap"><table><thead><tr><th>Subject Name</th><th style="text-align:right;">Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }
  document.getElementById("pageSubjects").innerHTML=html;
}
function openAddSubject(gk){var lbl={JSS:"JSS 1-3",Science:"SS Science",Arts:"SS Arts",Commercial:"SS Commercial"}[gk]||gk;openModal("Add Subject \u2014 "+lbl,'<div class="field"><label>Subject Name *</label><input id="subjInput" placeholder="e.g. Mathematics" style="width:100%;"/></div>',[{label:"Cancel",cls:"btnOutline",fn:"closeModal()"},{label:"Add Subject",cls:"btnGold",fn:"saveNewSubject('"+gk+"')"}]);setTimeout(function(){var el=document.getElementById("subjInput");if(el)el.focus();},100);}
function saveNewSubject(gk){var val=(document.getElementById("subjInput").value||"").trim();if(!val){alert("Please enter a subject name.");return;}if(!DB.subjects[gk])DB.subjects[gk]=[];if(DB.subjects[gk].indexOf(val)>-1){alert("Subject already exists.");return;}DB.subjects[gk].push(val);saveDB();closeModal();renderSubjects();}
function openEditSubject(gk,idx){var current=(DB.subjects[gk]||[])[idx]||"";openModal("Rename Subject",'<div class="field"><label>Subject Name *</label><input id="subjEditInput" value="'+current+'" style="width:100%;"/></div>',[{label:"Cancel",cls:"btnOutline",fn:"closeModal()"},{label:"Save",cls:"btnGold",fn:"saveEditSubject('"+gk+"',"+idx+")"}]);setTimeout(function(){var el=document.getElementById("subjEditInput");if(el){el.focus();el.select();}},100);}
function saveEditSubject(gk,idx){var val=(document.getElementById("subjEditInput").value||"").trim();if(!val){alert("Please enter a subject name.");return;}var old=DB.subjects[gk][idx];DB.subjects[gk][idx]=val;for(var sid in DB.scores){for(var term in DB.scores[sid]){if(DB.scores[sid][term][old]!==undefined){DB.scores[sid][term][val]=DB.scores[sid][term][old];delete DB.scores[sid][term][old];}}}saveDB();closeModal();renderSubjects();}
function deleteSubject(gk,idx){var name=(DB.subjects[gk]||[])[idx];if(!name)return;if(!confirm('Remove "'+name+'" from '+gk+'? All scores for this subject will also be deleted.'))return;DB.subjects[gk].splice(idx,1);for(var sid in DB.scores){for(var term in DB.scores[sid]){delete DB.scores[sid][term][name];}}saveDB();renderSubjects();}

function renderParents(){
  var rows="";
  for(var i=0;i<DB.students.length;i++){var s=DB.students[i];var hasLogin=s.parentEmail&&s.parentPass;rows+="<tr><td><strong>"+s.name+"</strong><br><span style='color:#888;font-size:11px;'>"+s.cls+(isJSS(s.cls)?"":" / "+s.dept)+"</span></td><td>"+(s.parentName||"\u2014")+"</td><td>"+(s.parentEmail||"<em style='color:#bbb;'>No email set</em>")+"</td><td>"+(hasLogin?"<span class='badge badgeGreen'>Active</span>":"<span class='badge' style='background:#fee2e2;color:#dc2626;'>No Login</span>")+"</td><td><button class='btn btnOutline btnSm' onclick='openEditStudent("+s.id+")'>Edit</button></td></tr>";}
  if(!rows)rows="<tr><td colspan='5' style='text-align:center;color:#aaa;padding:28px;'>No students yet.</td></tr>";
  document.getElementById("pageParents").innerHTML='<div class="card"><div class="cardHeader"><div class="cardTitle">Parent / Guardian Portal Access</div></div><div class="tableWrap"><table><thead><tr><th>Student</th><th>Parent Name</th><th>Login Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderParentView(){
  if(!currentUser||currentUser.role!=="parent")return;
  var stu=null;for(var i=0;i<DB.students.length;i++){if(DB.students[i].id===currentUser.studentId){stu=DB.students[i];break;}}
  if(!stu){document.getElementById("pageParentView").innerHTML='<div class="card"><div class="cardBody" style="text-align:center;padding:40px;color:#aaa;">No student record found. Please contact the school admin.</div></div>';return;}
  var tO="";for(var j=0;j<TERMS.length;j++){tO+="<option value='"+TERMS[j]+"'"+(parentTerm===TERMS[j]?" selected":"")+">"+TERMS[j]+"</option>";}
  document.getElementById("pageParentView").innerHTML='<p style="font-size:13px;color:#555;margin-bottom:10px;">Welcome, <strong>'+currentUser.name+'</strong>. Report for <strong>'+stu.name+'</strong> &mdash; '+stu.cls+(isJSS(stu.cls)?"":" ("+stu.dept+")")+'</p><div class="card" style="margin-bottom:14px;"><div class="cardBody" style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;"><div class="field" style="margin:0;"><label>Term</label><select onchange="parentTerm=this.value;renderParentPreview()">'+tO+'</select></div><button class="btn btnGold" onclick="downloadPDF()">&#8595; Download PDF</button><button class="btn btnNavy" onclick="printReport()">&#128438; Print</button></div></div><div class="reportTabs"><button class="reportTab'+(parentReportType==="test"?" active":"")+'" onclick="parentReportType=\'test\';renderParentPreview()">&#128221; Test Report (CA)</button><button class="reportTab'+(parentReportType==="exam"?" active":"")+'" onclick="parentReportType=\'exam\';renderParentPreview()">&#128196; Full Examination Report</button></div><div id="parentPreviewArea"></div>';
  renderParentPreview();
}
function renderParentPreview(){var a=document.getElementById("parentPreviewArea");if(!a)return;a.innerHTML=buildReportHTML(buildReportData(currentUser.studentId,parentTerm),parentReportType);}

function openModal(title,body,buttons){
  document.getElementById("modalTitle").textContent=title;document.getElementById("modalBody").innerHTML=body;
  var f=document.getElementById("modalFooter");f.innerHTML="";
  for(var i=0;i<buttons.length;i++){var b=document.createElement("button");b.className="btn "+buttons[i].cls;b.textContent=buttons[i].label;b.setAttribute("onclick",buttons[i].fn);f.appendChild(b);}
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("open");}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("sidebarOverlay").classList.toggle("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sidebarOverlay").classList.remove("open");}

document.addEventListener("DOMContentLoaded",function(){
  initFirebase();
  document.addEventListener("keydown",function(e){
    if(e.key==="Escape")closeModal();
    if(e.key==="Enter"){var mo=document.getElementById("modalOverlay");if(mo&&mo.classList.contains("open"))return;var pls=document.getElementById("parentLoginScreen");var als=document.getElementById("adminLoginScreen");if(pls&&pls.style.display!=="none")doParentLogin();else if(als&&als.style.display!=="none")doAdminLogin();}
  });
  var el1=document.getElementById("img1"),el2=document.getElementById("img2"),el3=document.getElementById("img3");
  if(el1)el1.src=LOGO_SRC;if(el2)el2.src=LOGO_SRC;if(el3)el3.src=LOGO_SRC;
});

</script>
